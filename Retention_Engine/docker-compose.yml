services:
  retention-engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env                    # copy .env.example → .env and fill in your keys
    environment:
      # Data paths inside the container (auto-detected from data/ — no change needed)
      APP_ENV: development
      LOG_LEVEL: INFO
    volumes:
      # Mount source for hot-reload during development
      - ./app:/app/app
      - ./frontend:/app/frontend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
